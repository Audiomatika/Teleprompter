<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teleprompter — BosePark</title>
    <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

        /* ===== Header ===== */
        .app-header {
            height: 64px;
            padding: 0 1.25rem;
            background: rgba(1, 40, 39, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        a.header-brand {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s ease;
        }

        a.header-brand:hover {
            opacity: 0.75;
        }

        .header-logo {
            flex-shrink: 0;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #ffffff;
            margin: 0;
            line-height: 1.1;
        }

        .header-badge {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.85rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .status-pill .status-dot {
            width: 8px;
            height: 8px;
            margin-right: 0;
        }

        /* ===== Upload Section ===== */
        .upload-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 2rem 1.5rem;
        }

        .upload-card {
            width: 100%;
            max-width: 440px;
        }

        .upload-zone {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 18px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-zone:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(0, 229, 149, 0.15), 0 0 0 1px rgba(0, 229, 149, 0.3);
        }

        .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 229, 149, 0.2), 0 0 0 1px rgba(0, 229, 149, 0.4);
        }

        .upload-icon-wrapper {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-dim);
            border-radius: 18px;
            margin: 0 auto 1.5rem;
        }

        .upload-headline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .upload-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        .upload-progress {
            margin-top: 1.25rem;
            font-family: 'Inter', sans-serif;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ===== Script Section ===== */
        .script-section {
            padding: 0.75rem 1rem;
            padding-bottom: 110px;
        }

        .script-section .script-container {
            height: calc(100vh - 180px);
            overflow-y: auto;
            background: #000000;
            border-radius: 14px;
            border: 1px solid rgba(0, 229, 149, 0.08);
        }

        .script-section .script-text {
            padding: 1.5rem;
            font-size: 1.15rem;
            line-height: 1.7;
        }

        /* ===== Controls Panel ===== */
        .controls-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(1, 40, 39, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.875rem 1.25rem;
            padding-bottom: calc(0.875rem + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0;
            z-index: 100;
            border-top: 1px solid var(--border);
        }

        .controls-left,
        .controls-right {
            flex: 0 0 48px;
            display: flex;
            align-items: center;
        }

        .controls-right {
            justify-content: flex-end;
        }

        .controls-center {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
            flex: 1;
        }

        /* Icon Buttons */
        .ctrl-btn {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:hover {
            background: rgba(0, 229, 149, 0.15);
            border-color: rgba(0, 229, 149, 0.3);
            box-shadow: 0 4px 16px rgba(0, 229, 149, 0.1);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        /* Play/Pause Button */
        .btn-play {
            min-width: 130px;
            height: 52px;
            padding: 0 1.75rem;
            background: var(--accent);
            color: #012827;
            border: none;
            border-radius: 14px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.35rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-play:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(0, 229, 149, 0.25);
        }

        .btn-play:active {
            transform: scale(0.97);
        }

        /* Mirror active state */
        .btn-mirror-active {
            background: var(--accent) !important;
            color: #012827 !important;
            border-color: var(--accent) !important;
        }

        /* ===== Utility ===== */
        .hidden {
            display: none !important;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .app-header {
                height: 56px;
                padding: 0 1rem;
            }

            .header-title {
                font-size: 1.25rem;
            }

            .header-badge {
                font-size: 0.5rem;
            }

            .status-pill {
                font-size: 0.65rem;
                padding: 0.3rem 0.65rem;
            }

            .status-pill #statusText {
                display: none;
            }

            .upload-section {
                min-height: calc(100vh - 56px);
                padding: 1.5rem 1rem;
            }

            .upload-zone {
                padding: 2.5rem 1.5rem;
            }

            .upload-headline {
                font-size: 1.5rem;
            }

            .script-section {
                padding: 0.5rem 0.5rem;
                padding-bottom: 100px;
            }

            .script-section .script-container {
                height: calc(100vh - 160px);
                border-radius: 10px;
            }

            .script-section .script-text {
                padding: 1rem;
                font-size: 1rem;
                line-height: 1.6;
            }

            .controls-panel {
                padding: 0.75rem 0.75rem;
                padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
            }

            .controls-center {
                gap: 0.5rem;
            }

            .ctrl-btn {
                width: 44px;
                height: 44px;
                border-radius: 12px;
            }

            .btn-play {
                min-width: 110px;
                height: 48px;
                font-size: 1.2rem;
                border-radius: 12px;
            }
        }
        /* ===== Speed Control ===== */
        /* Edge-Buttons: absolut positioniert, stören den Flex-Fluss nicht */
        .btn-edge {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }
        .btn-edge-left  { left:  1.25rem; }
        .btn-edge-right { right: 1.25rem; }

        /* Drei gleiche Flex-Sektionen */
        .controls-speed-section,
        .controls-fontsize-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speed-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        /* Speed-Buttons: volle ctrl-btn Optik, etwas kleiner */
        .speed-btn {
            width: 44px !important;
            height: 44px !important;
        }

        .speed-display {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 2.6rem;
            text-align: center;
            user-select: none;
        }

        .fontsize-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .fontsize-btn {
            width: 44px !important;
            height: 44px !important;
        }

        .fontsize-display {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 2.6rem;
            text-align: center;
            user-select: none;
        }

        @media (max-width: 480px) {
            .btn-edge-left  { left:  0.75rem; }
            .btn-edge-right { right: 0.75rem; }
            .speed-btn {
                width: 40px !important;
                height: 40px !important;
            }
            .speed-display {
                font-size: 0.85rem;
                min-width: 2.2rem;
            }
            .fontsize-btn {
                width: 40px !important;
                height: 40px !important;
            }
            .fontsize-display {
                font-size: 0.85rem;
                min-width: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <script>
      if (sessionStorage.getItem('controller_nav')) {
        sessionStorage.removeItem('controller_nav');
      } else {
        window.location.replace('/');
      }
    </script>

    <!-- Header -->
    <header class="app-header">
        <a href="/" class="header-brand">
            <div class="header-titles">
                <h1 class="header-title">TELEPROMPTER</h1>
                <span class="header-badge">BosePark Productions</span>
            </div>
        </a>
        <div class="status-pill">
            <span class="status-dot disconnected" id="statusDot"></span>
            <span id="statusText">Nicht verbunden</span>
        </div>
    </header>

    <main class="main-content">
        <!-- Upload Section -->
        <section class="upload-section" id="uploadSection">
            <div class="upload-card">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon-wrapper">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00e595" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <p class="upload-headline">Skript Laden</p>
                    <p class="upload-subtitle">.docx Datei hierher ziehen oder klicken</p>
                    <input type="file" id="fileInput" accept=".docx" hidden>
                    <div class="upload-progress" id="uploadProgress" style="display:none;"></div>
                </div>
            </div>
        </section>

        <!-- Script View Section -->
        <section class="script-section hidden" id="scriptSection">
            <div class="script-container" id="livePreview">
                <div class="script-text" id="scriptText"></div>
            </div>
        </section>
    </main>

    <!-- Bottom Control Bar -->
    <div class="controls-panel hidden" id="controlsPanel">

        <!-- New Script: absolut links gepinnt -->
        <button class="ctrl-btn btn-edge btn-edge-left" id="btnNewScript" title="Neues Skript laden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
        </button>

        <!-- Speed Control: linkes Drittel -->
        <div class="controls-speed-section">
            <div class="speed-control">
                <button class="ctrl-btn speed-btn" id="btnSpeedDown" title="Langsamer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <span id="speedDisplay" class="speed-display">1.5</span>
                <button class="ctrl-btn speed-btn" id="btnSpeedUp" title="Schneller">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>

        <!-- Playback: mittleres Drittel -->
        <div class="controls-center">
            <button class="ctrl-btn" id="btnScrollTop" title="Zum Anfang">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 11 12 6 7 11"/>
                    <polyline points="17 18 12 13 7 18"/>
                </svg>
            </button>
            <button class="btn-play" id="btnPlayPause" title="Play/Pause">Play</button>
            <button class="ctrl-btn" id="btnScrollBottom" title="Zum Ende">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="7 13 12 18 17 13"/>
                    <polyline points="7 6 12 11 17 6"/>
                </svg>
            </button>
        </div>

        <!-- Textgröße: rechtes Drittel -->
        <div class="controls-fontsize-section">
            <div class="fontsize-control">
                <button class="ctrl-btn fontsize-btn" id="btnFontDown" title="Schrift kleiner">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <span id="fontsizeDisplay" class="fontsize-display">100%</span>
                <button class="ctrl-btn fontsize-btn" id="btnFontUp" title="Schrift größer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>

        <!-- Mirror: absolut rechts gepinnt -->
        <button class="ctrl-btn btn-edge btn-edge-right" id="btnMirror" title="Spiegelung umschalten">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3v18"/>
                <path d="M16 7l4 5-4 5"/>
                <path d="M8 7L4 12l4 5"/>
            </svg>
        </button>

    </div>

    <script src="/js/controller.js"></script>
</body>
</html>
